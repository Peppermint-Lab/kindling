services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kindling
      POSTGRES_USER: kindling
      POSTGRES_PASSWORD: kindling
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10

volumes:
  pgdata:
