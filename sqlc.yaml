version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries.sql"
    schema: "internal/database/schema.sql"
    gen:
      go:
        package: "queries"
        out: "internal/database/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
